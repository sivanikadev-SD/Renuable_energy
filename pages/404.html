<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – Page Not Found | SolarVolt Energy</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/dark-mode.css" />
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" />
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .error-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--sp-8);
            background: linear-gradient(135deg, #0a1628 0%, #0e2d1f 100%);
            min-height: 100vh;
        }

        .error-number {
            font-family: var(--font-heading);
            font-size: clamp(6rem, 18vw, 12rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--clr-primary), var(--clr-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: var(--sp-4);
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: var(--sp-4);
            animation: float 4s ease-in-out infinite;
        }

        .error-links {
            display: flex;
            gap: var(--sp-3);
            justify-content: center;
            flex-wrap: wrap;
            margin-top: var(--sp-8);
        }

        .navbar-simple {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-h);
            display: flex;
            align-items: center;
            padding-inline: var(--sp-6);
            background: rgba(10, 22, 40, .9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, .1);
            z-index: 100;
        }
    </style>
</head>

<body>
    <nav class="navbar-simple" aria-label="Site navigation">
        <a href="../index.html" class="navbar__logo" style="color:#fff">
            <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
                <circle cx="18" cy="18" r="18" fill="#0ea66b" opacity=".15" />
                <path d="M18 6l3 8h-6l3-8zm0 24l-3-8h6l-3 8zM6 18l8-3v6l-8-3zm24 0l-8 3v-6l8 3z" fill="#0ea66b" />
                <circle cx="18" cy="18" r="5" fill="#f59e0b" />
            </svg>
            Solar<span>Volt</span>
        </a>
    </nav>

    <main class="error-page" role="main">
        <div>
            <div class="error-icon" aria-hidden="true">⚡</div>
            <div class="error-number" aria-label="Error 404">404</div>
            <h1 style="color:#fff;margin-bottom:.75rem">Lost in the Solar Fields?</h1>
            <p style="color:rgba(255,255,255,.65);max-width:460px;margin-inline:auto;line-height:1.75">
                The page you're looking for has gone off-grid. Don't worry — let's get you back to clean energy
                territory.
            </p>
            <div class="error-links">
                <a href="../index.html" class="btn btn-primary btn-lg"><i class='bx bx-home'></i> Back to Home</a>
                <a href="services.html" class="btn btn-ghost btn-lg"
                    style="color:#fff;border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.08)"><i
                        class='bx bx-grid-alt'></i> Our Services</a>
                <a href="contact.html" class="btn btn-ghost btn-lg"
                    style="color:#fff;border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.08)"><i
                        class='bx bx-envelope'></i> Contact Us</a>
            </div>
            <p style="color:rgba(255,255,255,.35);font-size:.8rem;margin-top:3rem">
                If you believe this is an error, please <a href="contact.html" style="color:var(--clr-primary)">let us
                    know</a>.
            </p>
        </div>
    </main>

    <script src="../assets/js/main.js"></script>
</body>

</html>
